disabled_rules:
  - todo
  - trailing_comma
  - cyclomatic_complexity

excluded:
  - build
  - dist
  - docs
  - MacCamTests

line_length:
  warning: 140
  error: 220
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id

type_name:
  min_length: 2

function_body_length:
  warning: 90
  error: 160

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 700
