name: Feature request
description: Suggest an idea for MacCam
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that MacCam doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: offline
    attributes:
      label: Privacy
      options:
        - label: This feature keeps MacCam fully offline (no network/telemetry).
          required: true
